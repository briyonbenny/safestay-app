# If your repo includes the parent folder, use ../render.yaml (adds Node API + VITE_API_BASE_URL link).
# Static-only repo: create a Render Web Service for ../web technolagy first, then set VITE_API_BASE_URL here.
# https://render.com/docs/static-sites
services:
  - type: web
    name: safestay
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_API
        value: "true"
      - key: VITE_API_BASE_URL
        value: https://YOUR-API-WEB-SERVICE.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
