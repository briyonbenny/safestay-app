# If this Git repository root is "GroupSafeStayAssignment2SafeStay" (this folder), use this
# in Render: Blueprints → New Blueprint Instance, or add file at repo root.
# If your Git repo is ONLY the "safestay-react" folder, use safestay-react/render.yaml instead.
#
# Docs: https://render.com/docs/static-sites
# Replace VITE_API_BASE_URL with your actual Render Web Service URL (Node API), then redeploy, or set both vars in the dashboard instead.
services:
  - type: web
    name: safestay
    runtime: static
    rootDir: safestay-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_API
        value: "true"
      - key: VITE_API_BASE_URL
        value: https://YOUR-BACKEND-NAME.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
